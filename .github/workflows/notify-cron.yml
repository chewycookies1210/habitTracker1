name: Habit Tracker Notifications

# All times below are UTC. Central America runs UTC-6 year-round (no DST),
# so each schedule is the spec's local time (see habit-tracker spec section 7)
# shifted forward 6 hours. Evening/nudge slots land after midnight UTC, which
# is why their day-of-week fields are shifted forward by one day.
# Minutes are nudged a few off :00/:30 (GitHub's documented high-congestion
# marks) to reduce, though not eliminate, scheduling delay - GitHub Actions
# cron is best-effort and can still run late under load.
on:
  schedule:
    - cron: "45 12 * * 1-5" # weekday morning   (6:45am local, Mon-Fri)
    - cron: "0 19 * * 1-5"  # weekday midday    (1:00pm local, Mon-Fri)
    - cron: "30 14 * * 0,6" # weekend morning   (8:30am local, Sat-Sun)
    - cron: "30 19 * * 0,6" # weekend midday    (1:30pm local, Sat-Sun)
    - cron: "33 4 * * *"    # evening wind-down (~10:30pm local, every day)
    - cron: "0 0 * * 1"     # sunday review     (6:00pm local, Sun)
    - cron: "3 5 * * *"     # nudge / bedtime   (~11:00pm local, every day)
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot to trigger manually"
        required: true
        default: weekday-morning
        type: choice
        options:
          - weekday-morning
          - weekday-midday
          - weekend-morning
          - weekend-midday
          - evening
          - sunday-review
          - nudge-check

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determine slot
        id: slot
        run: |
          case "${{ github.event.schedule }}" in
            "45 12 * * 1-5") echo "value=weekday-morning" >> "$GITHUB_OUTPUT" ;;
            "0 19 * * 1-5") echo "value=weekday-midday" >> "$GITHUB_OUTPUT" ;;
            "30 14 * * 0,6") echo "value=weekend-morning" >> "$GITHUB_OUTPUT" ;;
            "30 19 * * 0,6") echo "value=weekend-midday" >> "$GITHUB_OUTPUT" ;;
            "33 4 * * *") echo "value=evening" >> "$GITHUB_OUTPUT" ;;
            "0 0 * * 1") echo "value=sunday-review" >> "$GITHUB_OUTPUT" ;;
            "3 5 * * *") echo "value=nudge-check" >> "$GITHUB_OUTPUT" ;;
            *) echo "value=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Call notify endpoint
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/notify?slot=${{ steps.slot.outputs.value }}"
